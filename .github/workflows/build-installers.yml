name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact: aifficator-macos
            tauri_args: --bundles app
          - label: Windows
            os: windows-latest
            artifact: aifficator-windows
            tauri_args: --bundles nsis,msi
          - label: Linux
            os: ubuntu-22.04
            artifact: aifficator-linux
            tauri_args: --bundles appimage,deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers
        run: npm run tauri:build -- ${{ matrix.tauri_args }}

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          arch="$(uname -m)"
          tar -C target/release/bundle/macos \
            -czf "target/release/bundle/Aifficator_${version}_${arch}.app.tar.gz" \
            Aifficator.app

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          mapfile -t files < <(find release-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.msi' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \))

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No installer files found."
            exit 1
          fi

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "Aifficator $TAG_NAME" --generate-notes

          gh release upload "$TAG_NAME" "${files[@]}" --clobber
